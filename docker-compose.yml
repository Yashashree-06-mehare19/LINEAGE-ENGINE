version: "3.9"

services:

  neo4j:
    image: neo4j:5.15.0
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/lineage_password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p lineage_password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  postgres:
    image: postgres:15.6
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lineage_user
      POSTGRES_PASSWORD: lineage_password
      POSTGRES_DB: lineage_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lineage_user -d lineage_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
  postgres_data: